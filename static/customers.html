<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户管理 - 德汇物业</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="/static/js/common.js"></script>
</head>
<body>
<div id="nav"></div>
<div class="container">
  <h2>客户管理</h2>
  <div id="opts" style="margin-bottom:14px"></div>

  <div id="view-list">
    <div class="row" style="margin-bottom:12px">
      <input id="keyword" placeholder="搜索：姓名/手机/企业名称/房号" oninput="loadCustomers()">
      <button onclick="showCreate()" style="max-width:120px">+ 新增客户</button>
    </div>
    <div class="table-wrap">
      <table id="tbl"><thead><tr>
        <th>客户名称</th><th>类型</th><th>主体</th><th>手机</th><th>状态</th><th>关联房源</th><th>操作</th>
      </tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div id="view-form" style="display:none">
    <h3 id="form-title">新增客户</h3>
    <form id="frm">
      <input type="hidden" name="id">
      <div class="form-grid">
        <div><label>客户类型</label><select name="customer_type" required>
          <option value="业主">业主</option><option value="租户">租户</option>
        </select></div>
        <div><label>主体类型</label><select name="subject_type" required>
          <option value="个人">个人</option><option value="企业">企业</option>
        </select></div>
        <div><label>名称</label><input name="name" required></div>
        <div><label>联系人</label><input name="contact_person"></div>
        <div><label>手机号</label><input name="phone" required></div>
        <div><label>证件号</label><input name="id_no"></div>
        <div><label>邮箱</label><input name="email" type="email"></div>
        <div><label>地址</label><input name="address"></div>
        <div><label>状态</label><select name="status">
          <option value="正常">正常</option><option value="在租">在租</option>
          <option value="已退租">已退租</option><option value="失效">失效</option>
        </select></div>
        <div><label>关联房源</label>
          <select name="unit_id" id="unit-select"><option value="">-- 选房源 --</option></select>
        </div>
      </div>
      <div style="margin-top:12px"><label>备注</label><textarea name="remark"></textarea></div>
      <div class="row" style="margin-top:14px">
        <button type="submit" style="max-width:120px">保存</button>
        <button type="button" class="secondary" onclick="showList()" style="max-width:120px">取消</button>
      </div>
    </form>
  </div>

  <div id="view-detail" style="display:none">
    <h3>客户详情</h3>
    <div class="card" style="max-width:700px">
      <div class="kv" id="detail-kv"></div>
      <div style="margin-top:14px">
        <button onclick="editCurrent()" style="max-width:120px">编辑</button>
        <button class="secondary" onclick="showList()" style="max-width:120px">返回</button>
      </div>
    </div>
  </div>
</div>
<script>
let currentCustomer = null;
let customersData = [];

document.getElementById('nav').outerHTML = navHtml('/customers');

(async () => {
  const opts = await api('/api/options');
  const sel = document.getElementById('opts');
  sel.innerHTML = '客户类型：' +
    opts.customerTypes.map(t => `<button onclick="filterType('${t}')" class="secondary" style="width:auto;padding:6px 10px">${t}</button>`).join(' ') +
    '　状态：' +
    opts.customerStatuses.map(s => `<button onclick="filterStatus('${s}')" class="secondary" style="width:auto;padding:6px 10px">${s}</button>`).join(' ');

  const units = await api('/api/customers/units');
  document.getElementById('unit-select').innerHTML = '<option value="">-- 无 --</option>' +
    units.map(u => `<option value="${u.id}">${u.unit_code} (${u.building_no || ''})</option>`).join('');
  loadCustomers();
})();

async function loadCustomers() {
  const kw = qs('keyword').value;
  customersData = await api(`/api/customers?keyword=${encodeURIComponent(kw)}`);
  renderTable(customersData);
}

function renderTable(rows) {
  const map = { '业主': 'badge', '租户': 'badge' };
  qs('tbl').querySelector('tbody').innerHTML = rows.map(r => `
    <tr>
      <td><a href="javascript:showDetail(${r.id})">${r.name}</a></td>
      <td>${r.customer_type}</td>
      <td>${r.subject_type}</td>
      <td>${r.phone}</td>
      <td><span class="badge">${r.status}</span></td>
      <td>${r.unit_code || '<span class="muted">-</span>'}</td>
      <td><button class="secondary" style="width:auto;padding:4px 10px" onclick="showEdit(${r.id})">编辑</button></td>
    </tr>`).join('') || '<tr><td colspan="7" style="text-align:center" class="muted">暂无数据</td></tr>';
}

function filterType(t) { renderTable(customersData.filter(r => r.customer_type === t)); }
function filterStatus(s) { renderTable(customersData.filter(r => r.status === s)); }

function showList() {
  ['view-list','view-form','view-detail'].forEach(id => qs(id).style.display = 'none');
  qs('view-list').style.display = '';
  loadCustomers();
}

function showCreate() {
  qs('frm').reset();
  qs('frm').id.value = '';
  qs('form-title').textContent = '新增客户';
  showForm();
}

async function showEdit(id) {
  const d = await api(`/api/customers/${id}`);
  currentCustomer = d.customer;
  const f = qs('frm');
  Object.keys(currentCustomer).forEach(k => {
    if (f[k]) f[k].value = currentCustomer[k] || '';
  });
  qs('unit-select').value = currentCustomer.unit_id || '';
  qs('form-title').textContent = '编辑客户';
  showForm();
}

function editCurrent() { if (currentCustomer) showEdit(currentCustomer.id); }

function showForm() {
  ['view-list','view-form','view-detail'].forEach(id => qs(id).style.display = 'none');
  qs('view-form').style.display = '';
}

async function showDetail(id) {
  const d = await api(`/api/customers/${id}`);
  currentCustomer = d.customer;
  const c = currentCustomer;
  qs('detail-kv').innerHTML = Object.entries({
    '客户名称': c.name, '类型': c.customer_type, '主体': c.subject_type,
    '手机': c.phone, '联系人': c.contact_person || '-', '证件号': c.id_no || '-',
    '邮箱': c.email || '-', '地址': c.address || '-', '状态': c.status,
    '备注': c.remark || '-', '创建时间': c.created_at
  }).map(([k,v]) => `<strong>${k}</strong><span>${v}</span>`).join('');
  if (d.units.length) qs('detail-kv').innerHTML += `<strong>关联房源</strong><span>${d.units.map(u => u.unit_code).join(', ')}</span>`;
  ['view-list','view-form','view-detail'].forEach(id => qs(id).style.display = 'none');
  qs('view-detail').style.display = '';
}

qs('frm').onsubmit = async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(qs('frm')).entries());
  if (data.id) {
    await api(`/api/customers/${data.id}`, { method: 'PUT', body: JSON.stringify(data) });
  } else {
    await api('/api/customers', { method: 'POST', body: JSON.stringify(data) });
  }
  alertMsg('保存成功');
  showList();
};
</script>
</body>
</html>
