<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>停车管理 - 德汇物业</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="/static/js/common.js"></script>
</head>
<body>
<div id="nav"></div>
<div class="container">
  <h2>停车位管理</h2>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
    <input id="keyword" placeholder="搜索：车位编号/车牌/客户名" oninput="loadSpaces()" style="flex:2">
    <button onclick="showSpaceForm()" style="max-width:140px">+ 新增车位</button>
    <button onclick="showVehicleForm()" class="secondary" style="max-width:140px">+ 新增车辆</button>
  </div>

  <div id="view-list">
    <h3 class="section-title">车位列表</h3>
    <div class="table-wrap">
      <table><thead><tr>
        <th>车位编号</th><th>区域</th><th>类型</th><th>状态</th><th>绑定客户</th><th>车牌</th><th>月租费</th><th>有效截止</th><th>操作</th>
      </tr></thead><tbody id="tbSpaces"></tbody></table>
    </div>

    <h3 class="section-title">临停记录</h3>
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <input id="kw-record" placeholder="搜索车牌" oninput="loadRecords()" style="flex:2">
      <button onclick="showTempForm()" style="max-width:160px">+ 临停登记</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>车牌</th><th>车位</th><th>入场时间</th><th>出场时间</th><th>时长(分)</th><th>应收</th><th>实收</th><th>状态</th><th>来源</th><th>操作</th>
      </tr></thead><tbody id="tbRecords"></tbody></table>
    </div>
  </div>

  <div id="view-space-form" style="display:none">
    <h3 id="space-form-title">新增车位</h3>
    <form id="frmSpace">
      <input type="hidden" name="id">
      <div class="form-grid">
        <div><label>车位编号</label><input name="parking_code" required></div>
        <div><label>区域</label><input name="area_zone" placeholder="如：地下1层A区"></div>
        <div><label>类型</label><select name="parking_type" required>
          <option value="固定车位">固定车位</option><option value="月租车位">月租车位</option>
          <option value="临停车位">临停车位</option><option value="充电车位">充电车位</option>
        </select></div>
        <div><label>状态</label><select name="status">
          <option value="空闲">空闲</option><option value="已分配">已分配</option>
          <option value="停用">停用</option><option value="占用">占用</option>
        </select></div>
        <div><label>月租费用</label><input name="monthly_fee" type="number" step="0.01" value="0"></div>
      </div>
      <div class="row" style="margin-top:14px">
        <button type="submit" style="max-width:120px">保存</button>
        <button type="button" class="secondary" onclick="showList()" style="max-width:120px">取消</button>
      </div>
    </form>
  </div>

  <div id="view-vehicle-form" style="display:none">
    <h3>新增车辆</h3>
    <form id="frmVehicle">
      <div class="form-grid">
        <div><label>客户</label><select name="customer_id" id="sel-cust" required></select></div>
        <div><label>车牌号</label><input name="plate_no" required></div>
        <div><label>车辆类型</label><select name="vehicle_type">
          <option value="燃油车">燃油车</option><option value="新能源车">新能源车</option>
          <option value="其他">其他</option>
        </select></div>
        <div><label>颜色</label><input name="color"></div>
        <div><label>月租开始</label><input name="monthly_start" type="date"></div>
        <div><label>月租结束</label><input name="monthly_end" type="date"></div>
      </div>
      <div class="row" style="margin-top:14px">
        <button type="submit" style="max-width:120px">保存</button>
        <button type="button" class="secondary" onclick="showList()" style="max-width:120px">取消</button>
      </div>
    </form>
  </div>

  <div id="view-assign" style="display:none">
    <h3>分配车位</h3>
    <form id="frmAssign">
      <input type="hidden" name="space_id" id="assign-space-id">
      <div class="form-grid">
        <div><label>客户</label><select name="bind_customer_id" id="sel-assign-cust" required></select></div>
        <div><label>绑定车辆</label><select name="bind_vehicle_id" id="sel-assign-vehicle"></select></div>
        <div><label>月租费(元/月)</label><input name="monthly_fee" type="number" step="0.01"></div>
        <div><label>生效开始</label><input name="effective_start" type="date"></div>
        <div><label>生效截止</label><input name="effective_end" type="date"></div>
      </div>
      <div class="row" style="margin-top:14px">
        <button type="submit" style="max-width:120px">确认分配</button>
        <button type="button" class="secondary" onclick="showList()" style="max-width:120px">取消</button>
      </div>
    </form>
  </div>

  <div id="view-temp" style="display:none">
    <h3>临停登记</h3>
    <form id="frmTemp">
      <div class="form-grid">
        <div><label>车牌号</label><input name="plate_no" required></div>
        <div><label>车位</label><select name="parking_space_id" id="sel-temp-space"><option value="">-- 临停专用 --</option></select></div>
        <div><label>入场时间</label><input name="entry_time" type="datetime-local"></div>
      </div>
      <div class="row" style="margin-top:14px">
        <button type="submit" style="max-width:120px">登记入场</button>
        <button type="button" class="secondary" onclick="showList()" style="max-width:120px">取消</button>
      </div>
    </form>
  </div>
</div>
<script>
let customersOpts = [], vehiclesOpts = [], spacesOpts = [];
document.getElementById('nav').outerHTML = navHtml('/parking');

(async () => {
  const custs = await api('/api/customers');
  customersOpts = custs;
  document.getElementById('sel-cust').innerHTML = '<option value="">-- 选客户 --</option>' + custs.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('sel-assign-cust').innerHTML = document.getElementById('sel-cust').innerHTML;

  const spaces = await api('/api/parking/spaces');
  spacesOpts = spaces;
  document.getElementById('sel-temp-space').innerHTML = '<option value="">-- 临停专用 --</option>' + spaces.filter(s => s.parking_type === '临停车位').map(s => `<option value="${s.id}">${s.parking_code} (${s.area_zone})</option>`).join('');

  loadSpaces();
  loadRecords();
})();

async function loadSpaces() {
  const kw = qs('keyword').value;
  const spaces = await api(`/api/parking/spaces`);
  const filtered = spaces.filter(s => !kw || s.parking_code.includes(kw) || (s.customer_name || '').includes(kw) || (s.plate_no || '').includes(kw));
  document.getElementById('tbSpaces').innerHTML = filtered.map(s => {
    const st = { '空闲': 'badge', '已分配': 'badge', '停用': 'badge warn', '占用': 'badge' };
    return `<tr>
      <td>${s.parking_code}</td><td>${s.area_zone || '-'}</td><td>${s.parking_type}</td>
      <td><span class="${st[s.status] || 'badge'}">${s.status}</span></td>
      <td>${s.customer_name || '-'}</td><td>${s.plate_no || '-'}</td>
      <td>${formatMoney(s.monthly_fee)}</td><td>${s.effective_end || '-'}</td>
      <td>
        <button class="secondary" style="width:auto;padding:4px 8px" onclick="showAssign(${s.id})">分配</button>
        <button class="secondary" style="width:auto;padding:4px 8px" onclick="showSpaceEdit(${s.id})">编辑</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" style="text-align:center" class="muted">暂无数据</td></tr>';
}

async function loadRecords() {
  const kw = qs('kw-record')?.value || '';
  const records = await api('/api/parking/records');
  const filtered = records.filter(r => !kw || r.plate_no.includes(kw));
  document.getElementById('tbRecords').innerHTML = filtered.map(r => {
    const st = { '未支付': 'badge warn', '已支付': 'badge', '异常': 'badge warn' };
    return `<tr>
      <td><b>${r.plate_no}</b></td><td>${r.parking_code || '-'}</td>
      <td>${r.entry_time}</td><td>${r.exit_time || '<span class="muted">未出场</span>'}</td>
      <td>${r.duration_minutes ? r.duration_minutes + '分钟' : '-'}</td>
      <td>${formatMoney(r.receivable_fee)}</td><td>${formatMoney(r.received_fee)}</td>
      <td><span class="${st[r.pay_status] || 'badge'}">${r.pay_status}</span></td>
      <td>${r.source}</td>
      <td>
        ${r.exit_time ? '-' : `<button class="secondary" style="width:auto;padding:4px 8px" onclick="checkout(${r.id})">出场结算</button>`}
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="10" style="text-align:center" class="muted">暂无数据</td></tr>';
}

function showList() {
  ['view-list','view-space-form','view-vehicle-form','view-assign','view-temp'].forEach(id => qs(id).style.display = 'none');
  qs('view-list').style.display = '';
}

function showSpaceForm() {
  qs('frmSpace').reset();
  qs('frmSpace').id.value = '';
  qs('space-form-title').textContent = '新增车位';
  showForm('view-space-form');
}

async function showSpaceEdit(id) {
  const spaces = await api('/api/parking/spaces');
  const s = spaces.find(x => String(x.id) === String(id));
  if (!s) return;
  const f = qs('frmSpace');
  f.id.value = s.id; f.parking_code.value = s.parking_code; f.area_zone.value = s.area_zone || '';
  f.parking_type.value = s.parking_type; f.status.value = s.status; f.monthly_fee.value = s.monthly_fee || 0;
  qs('space-form-title').textContent = '编辑车位';
  showForm('view-space-form');
}

function showForm(id) {
  ['view-list','view-space-form','view-vehicle-form','view-assign','view-temp'].forEach(i => qs(i).style.display = 'none');
  qs(id).style.display = '';
}

async function showAssign(spaceId) {
  document.getElementById('assign-space-id').value = spaceId;
  const vehicles = await api('/api/parking/vehicles');
  vehiclesOpts = vehicles;
  document.getElementById('sel-assign-vehicle').innerHTML = '<option value="">-- 无 --</option>' +
    vehicles.map(v => `<option value="${v.id}">${v.plate_no} (${v.customer_name})</option>`).join('');
  showForm('view-assign');
}

function showVehicleForm() {
  qs('frmVehicle').reset();
  showForm('view-vehicle-form');
}

function showTempForm() {
  qs('frmTemp').reset();
  showForm('view-temp');
}

qs('frmSpace').onsubmit = async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(qs('frmSpace')).entries());
  if (data.id) {
    alertMsg('编辑保存（此版本简化）');
    showList();
  } else {
    await api('/api/parking/spaces', { method: 'POST', body: JSON.stringify(data) });
    alertMsg('车位创建成功');
    showList();
  }
};

qs('frmVehicle').onsubmit = async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(qs('frmVehicle')).entries());
  await api('/api/parking/vehicles', { method: 'POST', body: JSON.stringify(data) });
  alertMsg('车辆创建成功');
  showList();
};

qs('frmAssign').onsubmit = async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(qs('frmAssign')).entries());
  data.space_id = document.getElementById('assign-space-id').value;
  await api(`/api/parking/spaces/${data.space_id}/assign`, { method: 'POST', body: JSON.stringify(data) });
  alertMsg('车位分配成功');
  showList();
};

qs('frmTemp').onsubmit = async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(qs('frmTemp')).entries());
  if (data.entry_time) data.entry_time = data.entry_time.replace('T', ' ');
  await api('/api/parking/records', { method: 'POST', body: JSON.stringify(data) });
  alertMsg('临停登记成功');
  showList();
};

async function checkout(recordId) {
  if (!confirm('确认该车辆已出场？')) return;
  try {
    const result = await api(`/api/parking/records/${recordId}/checkout`, { method: 'POST', body: JSON.stringify({}) });
    alertMsg(`出场结算：停车${result.duration_minutes}分钟，收费¥${result.receivable_fee}，状态：${result.pay_status}`);
    loadRecords();
  } catch (e) { alertMsg(e.message); }
}
</script>
</body>
</html>
