<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租金收缴 - 德汇物业</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="/static/js/common.js"></script>
</head>
<body>
<div id="nav"></div>
<div class="container">
  <h2>租金收缴</h2>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">
    <input id="keyword" placeholder="搜索：账单号/客户名/房号" oninput="loadBills()" style="flex:2">
    <button onclick="showCreateBill()" style="max-width:140px">+ 生成账单</button>
    <button onclick="showPayment()" class="secondary" style="max-width:140px">+ 缴费登记</button>
  </div>

  <div id="view-list">
    <div class="table-wrap">
      <table><thead><tr>
        <th>账单号</th><th>客户</th><th>房源</th><th>类型</th>
        <th>应收</th><th>实收</th><th>欠费</th><th>状态</th><th>应缴日期</th><th>操作</th>
      </tr></thead><tbody id="tbBills"></tbody></table>
    </div>

    <h3 class="section-title">缴费记录</h3>
    <div class="table-wrap">
      <table><thead><tr>
        <th>账单号</th><th>客户</th><th>金额</th><th>方式</th><th>付款人</th><th>时间</th><th>经办人</th>
      </tr></thead><tbody id="tbPays"></tbody></table>
    </div>

    <h3 class="section-title">欠费提醒</h3>
    <div id="tbReminders" class="table-wrap"></div>
  </div>

  <div id="view-form" style="display:none">
    <h3 id="form-title">生成账单</h3>
    <form id="frmBill">
      <div class="form-grid">
        <div><label>账单编号</label><input name="bill_no" placeholder="自动生成" id="bill_no_input"></div>
        <div><label>客户</label><select name="customer_id" id="sel-customer" required></select></div>
        <div><label>房源</label><select name="unit_id" id="sel-unit" required></select></div>
        <div><label>计费周期开始</label><input name="billing_period_start" type="date" required></div>
        <div><label>计费周期结束</label><input name="billing_period_end" type="date" required></div>
        <div><label>单价(元/㎡)</label><input name="unit_price" type="number" step="0.01" id="unit-price" placeholder="输入后自动计算"></div>
        <div><label>应缴日期</label><input name="due_date" type="date" required></div>
      </div>
      <div id="calc-result" style="margin-top:10px;font-weight:bold"></div>
      <div class="row" style="margin-top:14px">
        <button type="submit" style="max-width:120px">生成账单</button>
        <button type="button" class="secondary" onclick="showList()" style="max-width:120px">取消</button>
      </div>
    </form>
  </div>

  <div id="view-payment" style="display:none">
    <h3>缴费登记</h3>
    <form id="frmPay">
      <div class="form-grid">
        <div><label>账单</label><select name="bill_id" id="sel-bill" required></select></div>
        <div><label>实收金额</label><input name="amount" type="number" step="0.01" required></div>
        <div><label>支付方式</label><select name="payment_method" id="sel-pay-method"></select></div>
        <div><label>付款人</label><input name="payer_name"></div>
        <div><label>支付时间</label><input name="paid_at" type="datetime-local"></div>
        <div><label>备注</label><input name="remark"></div>
      </div>
      <div class="row" style="margin-top:14px">
        <button type="submit" style="max-width:120px">确认缴费</button>
        <button type="button" class="secondary" onclick="showList()" style="max-width:120px">取消</button>
      </div>
    </form>
  </div>
</div>
<script>
let customersOpts = [], unitsOpts = [];
document.getElementById('nav').outerHTML = navHtml('/rent');

(async () => {
  const opts = await api('/api/options');
  const methods = opts.paymentMethods.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('sel-pay-method').innerHTML = methods;
  document.getElementById('sel-bill').innerHTML = '<option value="">-- 选账单 --</option>';

  const custs = await api('/api/customers');
  customersOpts = custs;
  document.getElementById('sel-customer').innerHTML = '<option value="">-- 选客户 --</option>' + custs.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  const units = await api('/api/customers/units');
  unitsOpts = units;
  document.getElementById('sel-unit').innerHTML = '<option value="">-- 选房源 --</option>' + units.map(u => `<option value="${u.id}">${u.unit_code} (${u.building_no})</option>`).join('');

  document.getElementById('sel-customer').onchange = () => loadPayments();
  loadBills();
  loadReminders();
})();

async function loadBills() {
  const kw = qs('keyword').value;
  const bills = await api(`/api/rent/bills?keyword=${encodeURIComponent(kw)}`);
  document.getElementById('tbBills').innerHTML = bills.map(b => {
    const st = { '已支付': 'badge', '部分支付': 'badge', '待支付': 'badge', '已逾期': 'badge warn', '已核销': 'badge' };
    return `<tr>
      <td>${b.bill_no}</td><td>${b.customer_name || '-'}</td><td>${b.unit_code || '-'}</td><td>${b.bill_type}</td>
      <td>${formatMoney(b.amount_receivable)}</td><td>${formatMoney(b.amount_received)}</td>
      <td style="color:${b.amount_outstanding > 0 ? '#dc2626' : ''}">${formatMoney(b.amount_outstanding)}</td>
      <td><span class="${st[b.status] || 'badge'}">${b.status}</span></td>
      <td>${b.due_date || '-'}</td>
      <td><button class="secondary" style="width:auto;padding:4px 10px" onclick="payBill(${b.id},'${b.bill_no}',${b.amount_outstanding})">缴费</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="10" style="text-align:center" class="muted">暂无数据</td></tr>';
}

async function loadPayments() {
  const pays = await api('/api/rent/payments');
  document.getElementById('tbPays').innerHTML = pays.map(p => `
    <tr><td>${p.bill_no || '-'}</td><td>${p.customer_name || '-'}</td>
    <td>${formatMoney(p.amount)}</td><td>${p.payment_method || '-'}</td>
    <td>${p.payer_name || '-'}</td><td>${p.paid_at || '-'}</td><td>${p.operator_id}</td></tr>`
  ).join('') || '<tr><td colspan="7" style="text-align:center" class="muted">暂无数据</td></tr>';
}

async function loadReminders() {
  const rems = await api('/api/rent/reminders');
  document.getElementById('tbReminders').innerHTML = '<table><thead><tr><th>账单号</th><th>客户</th><th>房源</th><th>欠费金额</th><th>应缴日期</th><th>提醒状态</th><th>操作</th></tr></thead><tbody>' +
    rems.map(r => `<tr><td>${r.bill_no}</td><td>${r.customer_name || '-'}</td><td>${r.unit_code || '-'}</td>
    <td style="color:#dc2626">${formatMoney(r.amount_outstanding)}</td><td>${r.due_date || '-'}</td>
    <td><span class="badge">${r.reminder_status}</span></td>
    <td><button class="secondary" style="width:auto;padding:4px 8px" onclick="markReminder(${r.id})">标记已提醒</button></td></tr>`
    ).join('') + '</tbody></table>';
}

async function markReminder(id) {
  await api(`/api/rent/reminders/${id}`, { method: 'POST' });
  alertMsg('提醒已标记');
  loadReminders();
}

function showList() {
  ['view-list','view-form','view-payment'].forEach(id => qs(id).style.display = 'none');
  qs('view-list').style.display = '';
  loadBills(); loadPayments();
}

function showCreateBill() {
  qs('frmBill').reset();
  qs('calc-result').innerHTML = '';
  ['view-list','view-form','view-payment'].forEach(id => qs(id).style.display = 'none');
  qs('view-form').style.display = '';
  document.getElementById('form-title').textContent = '生成账单';
}

function showPayment() {
  qs('frmPay').reset();
  (async () => {
    const bills = await api('/api/rent/bills');
    document.getElementById('sel-bill').innerHTML = '<option value="">-- 选账单 --</option>' +
      bills.filter(b => b.amount_outstanding > 0).map(b => `<option value="${b.id}">${b.bill_no} - ${b.customer_name} - 欠${formatMoney(b.amount_outstanding)}</option>`).join('');
  })();
  ['view-list','view-form','view-payment'].forEach(id => qs(id).style.display = 'none');
  qs('view-payment').style.display = '';
}

qs('unit-price').oninput = () => {
  const sel = document.getElementById('sel-unit');
  const unit = unitsOpts.find(u => String(u.id) === sel.value);
  if (!unit) return;
  const price = parseFloat(qs('unit-price').value) || 0;
  const amount = (parseFloat(unit.area) * price).toFixed(2);
  qs('calc-result').innerHTML = `面积 <b>${unit.area}㎡</b> × 单价 <b>${price}元/㎡</b> = 应收 <b style="color:#2563eb">¥${amount}</b>`;
};

qs('frmBill').onsubmit = async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(qs('frmBill')).entries());
  data.bill_no = data.bill_no || '';
  try {
    await api('/api/rent/generate', { method: 'POST', body: JSON.stringify(data) });
    alertMsg('账单生成成功');
    showList();
  } catch (e) { alertMsg(e.message); }
};

function payBill(id, no, outstanding) {
  document.getElementById('sel-bill').value = id;
  qs('amount').value = outstanding > 0 ? outstanding : 0;
  showPayment();
}

qs('frmPay').onsubmit = async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(qs('frmPay')).entries());
  if (data.paid_at) data.paid_at = data.paid_at.replace('T', ' ');
  try {
    await api('/api/rent/payments', { method: 'POST', body: JSON.stringify(data) });
    alertMsg('缴费登记成功');
    showList();
  } catch (e) { alertMsg(e.message); }
};
</script>
</body>
</html>
